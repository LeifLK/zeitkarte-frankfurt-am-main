<app-header (infoClicked)="isInfoOpen = !isInfoOpen"></app-header>
<div class="map-container">
  <app-map-view #mapView></app-map-view>
  <app-map-overlay
    (mapDataLoaded)="mapView.updateMap($event)"
    (stationLoaded)="mapView.updateStation($event)"
  ></app-map-overlay>
</div>
<app-info [class.slide-in]="isInfoOpen" (closeClicked)="isInfoOpen = false"> </app-info>
